name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 关键点：指定工作目录，并使用 setup-gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
        build-root-directory: ./MyApp # 明确告诉它入口在 MyApp

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./MyApp # 确保在这个目录下执行

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: ./MyApp # 必须在此目录下运行

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: MyApp/app/build/outputs/apk/debug/*.apk

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        files: MyApp/app/build/outputs/apk/debug/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
